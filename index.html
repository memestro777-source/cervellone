<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<title>Cervellone! — Sfida in 4 Stadi</title>
<style>
  :root{
    --bg0:#141031; --bg1:#1e1848; --panel:#262055; --panel2:#2f2868;
    --ink:#f3efff; --dim:#a99fd6;
    --mint:#3ee8b5; --coral:#ff7a6e; --gold:#ffc94d; --sky:#5db8ff; --lilla:#b78bff;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  button{touch-action:manipulation;}
  html{-webkit-text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Nunito","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%, var(--bg1), var(--bg0));
    color:var(--ink); min-height:100vh; display:flex; justify-content:center;
  }
  #app{width:100%;max-width:560px;padding:14px;display:flex;flex-direction:column;min-height:100vh;}
  h1,h2,h3,.disp{font-family:"Baloo 2","Nunito",system-ui,sans-serif;letter-spacing:.3px;}

  /* ---------- header / HUD ---------- */
  .hud{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .hud .cat{font-weight:800;font-size:15px;padding:6px 12px;border-radius:999px;background:var(--panel2);}
  .hud .score{margin-left:auto;font-weight:900;font-size:18px;color:var(--gold);}
  .timerwrap{height:10px;background:var(--panel);border-radius:99px;overflow:hidden;margin-bottom:12px;}
  .timerbar{height:100%;width:100%;background:linear-gradient(90deg,var(--mint),var(--sky));transition:width .2s linear;border-radius:99px;}
  .timerbar.low{background:linear-gradient(90deg,var(--coral),var(--gold));}

  /* ---------- generic ---------- */
  .card{background:var(--panel);border-radius:var(--radius);padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .center{text-align:center;}
  .btn{
    font-family:inherit;font-weight:800;font-size:17px;color:var(--ink);
    background:var(--panel2);border:2px solid transparent;border-radius:14px;
    padding:12px 18px;cursor:pointer;transition:transform .08s, border-color .12s, background .12s;
  }
  .btn:active{transform:scale(.96);}
  .btn.primary{background:var(--mint);color:#0c2b20;font-size:19px;}
  .btn.big{padding:16px 30px;font-size:21px;}
  .btn.flash-ok{background:var(--mint)!important;color:#0c2b20;}
  .btn.flash-no{background:var(--coral)!important;color:#3a0d09;}
  .optgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .question{font-size:17px;color:var(--dim);font-weight:700;margin:0 0 10px;}
  .gamestage{flex:1;display:flex;flex-direction:column;}
  .feedback{height:26px;text-align:center;font-weight:900;font-size:17px;margin-top:8px;}
  .feedback.ok{color:var(--mint);} .feedback.no{color:var(--coral);}

  /* ---------- intro / results ---------- */
  .screen{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;animation:pop .35s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:none;}}
  .brainmoji{font-size:74px;text-align:center;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  .title{font-size:40px;margin:0;text-align:center;font-weight:800;}
  .subtitle{color:var(--dim);text-align:center;margin:0;font-size:16px;line-height:1.5;}
  .stagechips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .chip{padding:8px 14px;border-radius:999px;font-weight:800;font-size:14px;background:var(--panel2);}
  .chip.done{background:var(--mint);color:#0c2b20;}
  .chip.cur{outline:3px solid var(--gold);}
  .bignum{font-size:56px;font-weight:900;text-align:center;margin:6px 0;color:var(--gold);}
  .braintype{font-size:26px;font-weight:900;text-align:center;color:var(--mint);margin:0;}
  .stagelist{display:flex;flex-direction:column;gap:8px;}
  .stagerow{display:flex;justify-content:space-between;background:var(--panel2);padding:10px 16px;border-radius:12px;font-weight:800;}

  /* ---------- specific games ---------- */
  svg{display:block;margin:0 auto;max-width:100%;height:auto;}
  .asterofield{position:relative;height:320px;border-radius:var(--radius);background:radial-gradient(400px 260px at 60% 30%, #2a2364, #17123a);overflow:hidden;}
  .asteroid{
    position:absolute;width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #8f83c9, #4a3f8a 65%, #2c2560);
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;
    cursor:pointer;border:none;color:var(--ink);box-shadow:inset -6px -8px 14px rgba(0,0,0,.45);
    animation:drift 5s ease-in-out infinite alternate;
  }
  @keyframes drift{from{transform:translateY(-6px);}to{transform:translateY(6px);}}
  .asteroid.pop{animation:apop .25s ease forwards;}
  @keyframes apop{to{transform:scale(0);opacity:0;}}
  .padgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:320px;margin:14px auto 0;}
  .pad{aspect-ratio:1;border-radius:18px;border:none;cursor:pointer;opacity:.55;transition:opacity .1s, transform .1s;font-size:34px;}
  .pad.lit{opacity:1;transform:scale(1.06);box-shadow:0 0 24px currentColor;}
  .pad1{background:#ff6e87;color:#ff6e87;} .pad2{background:#3ee8b5;color:#3ee8b5;}
  .pad3{background:#ffc94d;color:#ffc94d;} .pad4{background:#5db8ff;color:#5db8ff;}
  .pad5{background:#ff9f43;color:#ff9f43;} .pad6{background:#b78bff;color:#b78bff;}
  .seqrow{display:flex;gap:10px;justify-content:center;font-size:44px;min-height:64px;align-items:center;}
  .numpick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  .numpick .btn.sel{border-color:var(--gold);background:#4a3f8a;}
  .arrowseq{display:flex;gap:6px;justify-content:center;font-size:30px;font-weight:900;flex-wrap:wrap;
    background:var(--panel2);border-radius:12px;padding:8px 10px;margin-bottom:10px;}
  .cube-fall{animation:cubefall .4s cubic-bezier(.2,.7,.3,1.15) both;}
  @keyframes cubefall{
    from{transform:translateY(-240px);opacity:0;}
    55%{opacity:1;}
    to{transform:translateY(0);opacity:1;}
  }
  .iconbtn{
    font-family:inherit;font-weight:800;font-size:13px;color:var(--dim);
    background:var(--panel);border:none;border-radius:999px;padding:6px 12px;cursor:pointer;
  }
  .iconbtn:active{transform:scale(.95);}
  .iconbtn.active{outline:2px solid var(--gold);background:var(--panel2);}
  .plate{
    position:relative;width:240px;height:240px;margin:12px auto 0;border-radius:50%;
    background:radial-gradient(circle at 42% 36%, #3d3580, #262055 70%);
    box-shadow:inset 0 0 0 8px #2f2868, inset 0 10px 26px rgba(0,0,0,.4), 0 8px 20px rgba(0,0,0,.35);
  }
  .platechip{
    position:absolute;border-radius:50%;
    border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:21px;color:#0c2b20;
    background:radial-gradient(circle at 34% 30%, #7ff3cf, #3ee8b5 65%, #23a37c);
    box-shadow:0 3px 8px rgba(0,0,0,.4);
    transition:transform .3s, opacity .3s;
  }
  .shufflewrap{position:relative;height:78px;margin:14px auto 4px;}
  .shufflecard{
    position:absolute;left:0;top:0;width:58px;height:76px;border-radius:12px;border:none;cursor:pointer;
    background:#3d3580;font-size:30px;color:inherit;
    transition-property:transform;transition-timing-function:cubic-bezier(.45,.05,.55,.95);
    box-shadow:0 4px 10px rgba(0,0,0,.35);
  }
  .shufflecard.covered{background:linear-gradient(145deg,#4a3f8a,#2f2868);}
  .fliprow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px auto 4px;}
  .shufflecard.flip{animation:flipin .45s ease;}
  .spin-cw,.spin-ccw{transform-box:fill-box;transform-origin:center;}
  .spin-cw{animation:spincw 5s linear infinite;}
  .spin-ccw{animation:spinccw 5s linear infinite;}
  @keyframes spincw{to{transform:rotate(360deg);}}
  @keyframes spinccw{to{transform:rotate(-360deg);}}
  @keyframes flipin{from{transform:rotateY(90deg);}to{transform:rotateY(0);}}

  /* ---------- responsive: tutto si adatta alla finestra ---------- */
  .title{font-size:clamp(28px,8vw,40px);}
  .bignum{font-size:clamp(36px,11vw,56px);}
  .brainmoji{font-size:clamp(54px,15vw,74px);}
  .btn{font-size:clamp(15px,4.2vw,17px);}
  .btn.big{font-size:clamp(17px,5vw,21px);padding:clamp(12px,3vw,16px) clamp(20px,6vw,30px);}
  .braintype{font-size:clamp(20px,6vw,26px);}
  .gamestage > svg{width:100%;max-width:340px;height:auto;}
  .padgrid{max-width:min(320px,84vw);}
  .asterofield{height:clamp(250px,46vh,330px);}
  .plate{width:min(240px,70vw);aspect-ratio:1;height:auto;}
  .platechip{width:clamp(42px,21.5%,52px);aspect-ratio:1;height:auto;margin:0;transform:translate(-50%,-50%);font-size:clamp(17px,4.5vw,21px);}
  .platechip:active{transform:translate(-50%,-50%) scale(.92);}
  .platechip.gone{transform:translate(-50%,-50%) scale(0) translateY(-50px) rotate(120deg);opacity:0;pointer-events:none;}
  .shufflecard{width:clamp(46px,13vw,58px);height:auto;aspect-ratio:58/76;font-size:clamp(24px,7vw,30px);}
  .seqrow{font-size:clamp(32px,10vw,44px);}
  .arrowseq{font-size:clamp(22px,7vw,30px);}

  .topbar{display:flex;justify-content:flex-end;gap:8px;min-height:30px;}
  .cellgrid{display:grid;gap:6px;max-width:min(340px,88vw);margin:12px auto;}
  .cellbtn{
    aspect-ratio:1;border-radius:10px;border:none;background:var(--panel2);
    font-size:clamp(16px,5.5vw,24px);cursor:pointer;color:inherit;
    transition:background .15s, transform .1s;
    display:flex;align-items:center;justify-content:center;
    line-height:1;padding:0;
  }
  .cellbtn:active{transform:scale(.94);}
  .cellbtn.good{background:var(--mint);color:#0c2b20;}
  .cellbtn.bad{background:var(--coral);color:#3a0d09;}
  .cellbtn.holecell{color:var(--gold);font-weight:900;}
  .cellbtn.activecell{outline:3px solid var(--gold);}
  .dots{display:flex;gap:9px;justify-content:center;margin:8px 0 2px;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--panel2);transition:background .2s, transform .2s;}
  .dot.on{background:var(--gold);transform:scale(1.15);}

  /* ================= RESTYLING GRAFICO ================= */
  :root{
    --bg0:#0f0c26; --bg1:#1a1440; --panel:#241e52; --panel2:#2e2766;
    --mint:#41f0b9; --gold:#ffcf57; --sky:#5fc9ff;
  }
  body{
    background:
      radial-gradient(900px 520px at 18% -8%, rgba(94,72,255,.30), transparent 60%),
      radial-gradient(700px 480px at 108% 12%, rgba(62,232,181,.14), transparent 55%),
      radial-gradient(1000px 700px at 50% 115%, rgba(255,110,135,.10), transparent 60%),
      linear-gradient(180deg,#161139,#0f0c26 70%);

  }
  .card{border:1px solid rgba(255,255,255,.07);
    background:linear-gradient(180deg,#282157,#221c4c);
    box-shadow:0 14px 34px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05);}
  .stagerow{border:1px solid rgba(255,255,255,.06);}
  .btn{
    background:linear-gradient(180deg,#342c76,#292254);
    border:1px solid rgba(255,255,255,.09);

  }
  .btn.primary{
    background:linear-gradient(135deg,#3ee8b5,#4fc7ff);
    color:#07281f; border:none;
    box-shadow:0 8px 22px rgba(62,232,181,.35), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .title{
    background:linear-gradient(92deg,#8fe8ff,#b78bff 45%,#3ee8b5);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 3px 14px rgba(100,130,255,.30));
  }
  .subtitle{color:#b6abe6;}
  .brainmoji{filter:drop-shadow(0 8px 22px rgba(93,184,255,.40));}
  .hud .cat{border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,#332b74,#2a2360);}
  .hud .score{text-shadow:0 0 16px rgba(255,207,87,.6);}
  .iconbtn{border:1px solid rgba(255,255,255,.08);}
  .timerwrap{height:12px;border:1px solid rgba(255,255,255,.07);box-shadow:inset 0 2px 6px rgba(0,0,0,.45);}
  .timerbar{background:linear-gradient(90deg,#3ee8b5,#4fc7ff,#b78bff);box-shadow:0 0 12px rgba(79,199,255,.55);}
  .timerbar.low{background:linear-gradient(90deg,#ff7a6e,#ffcf57);box-shadow:0 0 12px rgba(255,122,110,.65);}
  .chip{border:1px solid rgba(255,255,255,.09);}
  .chip.done{box-shadow:0 0 12px rgba(62,232,181,.45);}
  .cellbtn{border:1px solid rgba(255,255,255,.07);background:linear-gradient(180deg,#332b74,#272057);}
  .pad{box-shadow:0 6px 16px rgba(0,0,0,.38), inset 0 -8px 14px rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);}
  .platechip{border:1px solid rgba(255,255,255,.25);}
  .shufflecard{border:1px solid rgba(255,255,255,.08);}
  .bignum{text-shadow:0 0 22px rgba(255,207,87,.35);}
  .feedback{letter-spacing:.3px;}

  /* ---------- BOLLE 🫧 (ex asteroidi) ---------- */
  .asterofield{
    background:linear-gradient(180deg,#0d2c52,#0e4468 58%,#0a5570);
    border:1px solid rgba(160,220,255,.16);
  }
  .asterofield::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(420px 200px at 70% -12%, rgba(190,240,255,.20), transparent 60%),
      radial-gradient(3px 3px at 20% 80%, rgba(255,255,255,.25), transparent 60%),
      radial-gradient(2px 2px at 45% 62%, rgba(255,255,255,.2), transparent 60%),
      radial-gradient(2.5px 2.5px at 78% 74%, rgba(255,255,255,.22), transparent 60%);
  }
  .asteroid{
    background:radial-gradient(circle at 30% 26%,
      rgba(255,255,255,.92), rgba(190,235,255,.32) 22%,
      rgba(110,180,255,.14) 55%, rgba(80,150,235,.30) 100%);
    border:2px solid rgba(205,240,255,.55);
    color:#f2faff;text-shadow:0 1px 3px rgba(0,40,80,.75);
    box-shadow:inset -8px -10px 16px rgba(0,50,110,.30), 0 6px 14px rgba(0,0,0,.32);
    animation:bubbledrift 4s ease-in-out infinite alternate;
  }
  .asteroid::after{
    content:"";position:absolute;left:15%;top:11%;width:28%;height:19%;
    border-radius:50%;background:rgba(255,255,255,.8);
    filter:blur(1px);transform:rotate(-20deg);
  }
  @keyframes bubbledrift{from{transform:translateY(5px);}to{transform:translateY(-9px);}}

  /* ================= TEMA CHIARO + TUTTO PIU' GRANDE ================= */

    --bg0:#eef1ff; --bg1:#f7f5ff; --panel:#ffffff; --panel2:#edeaff;
    --ink:#2b2357; --dim:#6b639b;

  /* bolle su acqua chiara */
  .asterofield{
    background:linear-gradient(180deg,#c9e9ff,#9ed6f7 58%,#7fc6ef);
    border:1px solid #a7d6f2;
  }
  .asterofield::before{
    background:

<script>
"use strict";
/* =========================================================
   CERVELLONE! — remix di "Who Has The Biggest Brain?" (Playfish)
   + il minigioco degli orologi "Time Lapse" (Brain Age, Nintendo)
   4 stadi: Visiva, Logica, Calcolo, Memoria — 1 gioco a caso
   per stadio, 45 secondi ciascuno.
   ========================================================= */

const app = document.getElementById("app");
const STAGE_SECONDS = 45;
const rnd = n => Math.floor(Math.random()*n);
const pick = a => a[rnd(a.length)];
const shuffle = a => {a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const uniqOptions = (correct, gen, count=4) => {
  const set = new Set([correct]);
  let guard = 0;
  while(set.size<count && guard++<200){ const v = gen(); if(v!==correct) set.add(v); }
  return shuffle([...set]);
};


/* ---------- SUONI: Web Audio API, nessuna libreria esterna.
   Su mobile l'audio si può avviare solo dopo un gesto: lo sblocchiamo
   al primo tocco/click ovunque nella pagina. ---------- */
const SFX = (()=>{
  let ctx = null, muted = false, noiseBuf = null;
  const ensure = ()=>{
    try{
      if(!ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        if(AC) ctx = new AC();
      }
      if(ctx && ctx.state==="suspended") ctx.resume();
    }catch(e){ ctx = null; }
    return ctx;
  };
  document.addEventListener("pointerdown", ensure, {passive:true});
  document.addEventListener("touchstart", ensure, {passive:true});
  const getNoise = (c)=>{
    if(!noiseBuf){
      noiseBuf = c.createBuffer(1, c.sampleRate*0.5, c.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    }
    return noiseBuf;
  };
  function tone(freq, dur, opt){
    if(muted) return; const c = ensure(); if(!c) return;
    opt = opt||{};
    try{
      const t = c.currentTime + (opt.when||0);
      const o = c.createOscillator(), g = c.createGain();
      o.type = opt.type||"sine";
      o.frequency.setValueAtTime(freq, t);
      if(opt.slideTo) o.frequency.exponentialRampToValueAtTime(opt.slideTo, t+dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(opt.vol||0.12, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+dur+0.06);
    }catch(e){}
  }
  function noise(dur, opt){
    if(muted) return; const c = ensure(); if(!c) return;
    opt = opt||{};
    try{
      const t = c.currentTime + (opt.when||0);
      const src = c.createBufferSource(); src.buffer = getNoise(c); src.loop = true;
      const f = c.createBiquadFilter(); f.type = "bandpass"; f.Q.value = opt.q||1.2;
      f.frequency.setValueAtTime(opt.from||800, t);
      f.frequency.exponentialRampToValueAtTime(Math.max(40,opt.to||300), t+dur);
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(opt.vol||0.08, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      src.connect(f); f.connect(g); g.connect(c.destination);
      src.start(t); src.stop(t+dur+0.05);
    }catch(e){}
  }
  return {
    get muted(){ return muted; },
    toggle(){ muted = !muted; return muted; },
    click(){ tone(620,0.05,{vol:0.045,slideTo:340}); },
    ok(){
      tone(523,0.15,{type:"triangle",vol:0.11});
      tone(659,0.17,{vol:0.09,when:0.02});
      tone(1319,0.11,{vol:0.045,when:0.05});
    },
    no(){
      tone(185,0.26,{type:"sawtooth",vol:0.06,slideTo:110});
      noise(0.18,{vol:0.045,from:420,to:120});
    },
    lvlup(){
      [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.24,{type:"triangle",vol:Math.max(0.04,0.1-i*0.01),when:0.12+i*0.07}));
    },
    lvldown(){
      [440,349,262].forEach((f,i)=>tone(f,0.22,{type:"triangle",vol:0.075,when:0.12+i*0.11}));
    },
    flip(){ noise(0.16,{vol:0.06,from:500,to:2400,q:2}); },
    pop(){
      tone(360,0.09,{vol:0.1,slideTo:920});
      noise(0.05,{vol:0.04,from:2000,to:3200,q:3,when:0.012});
    },
    pad(i){
      const f = [262,294,330,392,440,523,587,659,784][i];
      tone(f,0.34,{vol:0.13});
      tone(f*2,0.22,{type:"triangle",vol:0.04,when:0.012});
    },
    tick(){ noise(0.035,{vol:0.055,from:2600,to:2000,q:6}); },
    fanfare(){
      const seq = [[523,659,784],[587,740,880],[659,831,988],[784,988,1175]];
      seq.forEach((ch,i)=>ch.forEach(f=>tone(f,0.32,{type:"triangle",vol:0.06,when:i*0.18})));
      tone(1568,0.55,{vol:0.055,when:0.74});
      noise(0.4,{vol:0.03,from:3000,to:6000,q:0.8,when:0.74});
    }
  };
})();

function t(k){
  let s = (STR[LANG] && STR[LANG][k]!==undefined) ? STR[LANG][k] : (STR.it[k]!==undefined ? STR.it[k] : k);
  for(let i=1;i<arguments.length;i++) s = s.split("{"+(i-1)+"}").join(arguments[i]);
  return s;
}
function langBtn(){
  const other = LANG==="en" ? "it" : "en";
  const b = el("button","iconbtn", other==="it" ? "\ud83c\uddee\ud83c\uddf9" : "\ud83c\uddec\ud83c\udde7");
  b.setAttribute("aria-label", other==="it" ? "Italiano" : "English");
  b.onclick = ()=>{ LANG = other; document.documentElement.lang = LANG; document.title = t("title"); showIntro(); };
  return b;
}

/* condivisione senza dipendenze: API nativa se c'e', altrimenti copia negli appunti */
async function shareText(text, url){
  try{
    if(navigator.share){
      await navigator.share(url ? {title:t("title"), text:text, url:url} : {title:t("title"), text:text});
      return "shared";
    }
  }catch(e){ if(e && e.name==="AbortError") return "cancel"; }
  const full = url ? text+"\n"+url : text;
  try{ await navigator.clipboard.writeText(full); return "copied"; }catch(e){}
  try{
    const ta = document.createElement("textarea");
    ta.value = full; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.append(ta); ta.select(); document.execCommand("copy"); ta.remove();
    return "copied";
  }catch(e){}
  return "fail";
}
function shareFeedback(btn, res){
  if(res==="copied"){
    const orig = btn.innerHTML;
    btn.innerHTML = t("copied");
    setTimeout(()=>{ btn.innerHTML = orig; }, 1500);
  }
}


/* ---------- RECORD PERSISTENTI: usa window.storage se disponibile (claude.ai),
   altrimenti resta in memoria per la sessione. Nessuna dipendenza esterna. ---------- */
const Store = {
  _m: {},
  async get(k){
    try{
      if(window.storage){ const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; }
    }catch(e){}
    return this._m[k]||null;
  },
  async set(k,v){
    try{
      if(window.storage){ await window.storage.set(k, JSON.stringify(v)); return; }
    }catch(e){}
    this._m[k]=v;
  }
};
let RECORDS = { bestCC:0, plays:0, catLvl:{} };
async function loadRecords(){
  const r = await Store.get("bigbrain-records");
  if(r) RECORDS = Object.assign(RECORDS, r);
}
function saveRecords(){ Store.set("bigbrain-records", RECORDS); }

/* Su alcuni browser mobili aspect-ratio non funziona e le celle vuote collassano:
   misuriamo la larghezza reale e fissiamo l'altezza via JS. */
function squareCells(grid){
  const fix = ()=>{
    const c = grid.firstElementChild;
    if(!c) return;
    const w = c.getBoundingClientRect().width;
    if(w>0) [...grid.children].forEach(b=>{ b.style.height = w+"px"; });
  };
  requestAnimationFrame(fix);
  setTimeout(fix, 120);
}

function topBar(withRestart){
  const t = el("div","topbar");
  t.append(soundBtn());
  if(withRestart) t.append(restartBtn("↺"));
  return t;
}

function runStage(cat, game){
  clearStage();
  let stageScore = 0;
  state.streak = 0;


  const hud = el("div","hud");
  const catchip = el("span","cat",cat.emoji+" "+game.name);
  catchip.style.color = cat.color;
  const scoreEl = el("span","score","0");
  hud.append(catchip, scoreEl, soundBtn(), restartBtn("\u21ba"));
  const tw = el("div","timerwrap");
  const tb = el("div","timerbar");
  tw.append(tb);
  const stageEl = el("div","gamestage");
  const fb = el("div","feedback","");
  app.append(hud, tw, stageEl, fb);

  let timeLeft = STAGE_SECONDS;
  let lastTickSec = -1;
  function startTimer(){
    timerInt = setInterval(()=>{
      timeLeft -= 0.2;
      const p = Math.max(0, timeLeft/STAGE_SECONDS*100);
      tb.style.width = p+"%";
      if(p<25) tb.classList.add("low");
      const sec = Math.ceil(timeLeft);
      if(sec<=5 && sec>=1 && sec!==lastTickSec){ lastTickSec = sec; SFX.tick(); }
      if(sec<=3) tw.classList.add("panic");          // allarme visivo ultimi 3 secondi
      if(timeLeft<=0) endStage();
    },200);
  }

  // Difficolta' a gradini: ogni 3 giuste si sale (facile -> medio-facile -> medio ->
  // medio-difficile -> difficile). Un errore toglie 1 dal conteggio. Si parte SEMPRE facile.
  let level = 1, progress = 0;
  const MAXLVL = 5;
  const api = {
    get level(){ return level; },
    correct(base=25){
      state.streak++;
      const pts = Math.round(base * (1 + 0.2*Math.min(state.streak-1,5)));
      stageScore += pts;
      scoreEl.textContent = stageScore;
      SFX.ok();
      progress++;
      if(progress>=3 && level<MAXLVL){ level++; progress = 0; }   // sale in silenzio
      fb.className="feedback ok";
      fb.textContent = "+"+pts+(state.streak>=3?"  \ud83d\udd25 "+t("streak")+" x"+state.streak:"");
    },
    wrong(){
      state.streak = 0;
      progress = Math.max(0, progress-1);            // un passo indietro nel conteggio
      SFX.no();                                       // ma i punti restano!
      fb.className="feedback no"; fb.textContent = "\u2716";
    },
    bonus(pts, label){                                // punti extra senza toccare la serie
      stageScore += pts;
      scoreEl.textContent = stageScore;
      fb.className="feedback ok"; fb.textContent = "+"+pts+"  "+label;
      SFX.lvlup();
    },
    stage: stageEl
  };

  function endStage(){
    clearInterval(timerInt); timerInt=null;
    if(currentCleanup){ try{currentCleanup();}catch(e){} currentCleanup=null; }
    state.stages.push({cat:cat, game:game.name, score:stageScore});
    state.doneCats.push(cat.id);
    state.total += stageScore;
    state.stageIndex++;
    if(state.stageIndex < CATEGORIES.length) showStageResult(stageScore);
    else showFinal();
  }

  // countdown 3-2-1 prima di partire: il timer scatta solo dopo
  const cdTimeouts = [];
  currentCleanup = ()=>cdTimeouts.forEach(clearTimeout);
  const cd = el("div","countdown","3");
  stageEl.append(cd);
  [["3",0],["2",800],["1",1600],[t("go"),2400]].forEach(([txt,ms])=>{
    cdTimeouts.push(setTimeout(()=>{
      cd.textContent = txt;
      txt.length<=1 ? SFX.tick() : SFX.ok();
      cd.classList.remove("zoom"); void cd.offsetWidth; cd.classList.add("zoom");
    }, ms));
  });
  cdTimeouts.push(setTimeout(()=>{
    cd.remove();
    startTimer();
    currentCleanup = game.start(api) || null;
  }, 3050));
}

function showStageResult(score){
  clearStage();
  const s = el("div","screen");

  const last = state.stages[state.stages.length-1];
  s.append(

    el("h2","title",t("stage_done")),
    el("p","subtitle",last.cat.emoji+" "+last.cat.name+" — "+last.game),
    el("div","bignum","+"+score)
  );

  b.onclick = showStageIntro;
  const wrap = el("div","center"); wrap.append(b); s.append(wrap);
  app.append(s);
}

  const numEl = el("div","bignum","0 cm³");
  const nameEl = el("p","braintype",brainType(0)[1]);
  s.append(
    emojiEl,
    el("h2","title",t("brain_measures")),
    numEl,
    nameEl
  );
  // il contatore sale attraversando tutti i tipi di cervello fino al tuo
  {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const TIERS = [50,200,350,500,700,900,1100,1400,1700,2100,2500];
    const crossed = TIERS.filter(x=>x<=cc).length;
    const DUR = reduce ? 0 : Math.min(8000, 2200 + crossed*550);   // lenta: si vedono tutti i passaggi
    const t0 = performance.now();
    let lastName = "";
    const finish = ()=>{
      numEl.textContent = cc+" cm³";
      emojiEl.textContent = em; nameEl.textContent = name;
      if(legendary){ emojiEl.classList.add("legendary"); legendaryCelebration(); }
      else SFX.fanfare();
    };
    if(DUR===0){ finish(); }
    else{
      const step = (now)=>{
        const p = Math.min(1,(now-t0)/DUR);
        const ease = p;   // lineare: ogni tipo di cervello ha il suo momento
        const v = Math.round(cc*ease);
        numEl.textContent = v+" cm³";
        const [e2,n2] = brainType(v);
        if(n2!==lastName){ lastName = n2; emojiEl.textContent = e2; nameEl.textContent = n2; SFX.tick(); }
        if(p<1) requestAnimationFrame(step);
        else finish();
      };
      requestAnimationFrame(step);
    }
  }
  if(state.stages.length===CATEGORIES.length){
    const sorted = [...state.stages].sort((a,b)=>b.score-a.score);
    const best = sorted[0], worst = sorted[sorted.length-1];
    if(best.score!==worst.score){
      s.append(el("p","subtitle center",
        "\ud83d\udcaa "+t("strength")+": <b>"+best.cat.emoji+" "+best.cat.name+"</b>"+
        " \u00b7 \ud83c\udfcb\ufe0f "+t("train")+": <b>"+worst.cat.emoji+" "+worst.cat.name+"</b>"));
    }
  }
  RECORDS.plays++;
  const isRecord = cc > RECORDS.bestCC;
  if(isRecord) RECORDS.bestCC = cc;
  saveRecords();
  if(isRecord && RECORDS.plays>1) s.append(el("p","braintype",t("new_record")));
  const list = el("div","stagelist");
  state.stages.forEach(st=>{
    list.append(el("div","stagerow","<span>"+st.cat.emoji+" "+st.cat.name+" · "+st.game+"</span><span style='color:var(--gold)'>"+st.score+"</span>"));
  });
  const card = el("div","card"); card.append(list); s.append(card);
  const shareB = el("button","btn",t("share_score"));
  shareB.onclick = async ()=>{
    const bar = v => { const f = Math.max(0, Math.min(5, Math.round(v/90))); return "\u2593".repeat(f)+"\u2591".repeat(5-f); };
    const lines = ["\ud83e\udde0 "+t("title")+" \u2014 "+cc+" cm\u00b3", em+" "+name];
    for(let i=0;i<state.stages.length;i+=2){
      const p = st => st.cat.emoji+" "+bar(st.score)+" "+st.score;
      lines.push(p(state.stages[i]) + (state.stages[i+1] ? "   "+p(state.stages[i+1]) : ""));
    }
    if(isRecord) lines.push(t("new_record"));
    shareFeedback(shareB, await shareText(lines.join("\n"), location.href));
  };
  const b = el("button","btn primary big",t("replay"));
  b.onclick = showIntro;
  const wrap = el("div","center");
  wrap.style.display="flex"; wrap.style.flexDirection="column";
  wrap.style.gap="10px"; wrap.style.alignItems="center";
  wrap.append(shareB, b); s.append(wrap);
  app.append(s);
}

/* =========================================================
   HELPERS UI per i minigiochi
   ========================================================= */
function askOptions(stage, questionHTML, boardNode, options, correct, api, next, base){
  stage.innerHTML = "";
  if(questionHTML) stage.append(el("p","question center",questionHTML));
  if(boardNode) stage.append(boardNode);
  const grid = el("div","optgrid");
  let locked = false;
  const refs = [];
  options.forEach(o=>{
    const b = el("button","btn", String(o.label!==undefined?o.label:o));
    if(o.node){ b.innerHTML=""; b.append(o.node); }
    const val = o.value!==undefined?o.value:o;
    refs.push({b, val});
    b.onclick = ()=>{
      if(locked) return; locked = true;
      const ok = val===correct;
      b.classList.add(ok?"flash-ok":"flash-no");
      if(!ok){
        const cb = refs.find(x=>x.val===correct);
        if(cb) cb.b.classList.add("flash-ok");
      }
      ok ? api.correct(base) : api.wrong();
      setTimeout(next, ok?350:1000);
    };
    grid.append(b);
  });
  stage.append(grid);
}

/* ----- Cube Counter (WHTBB) ----- */
const cubeCounter = {
  get name(){return t("g_cube_n");}, get desc(){return t("g_cube_d");},
  start(api){
    const S = api.stage;
    function round(){
      const L = api.level;
      const N   = L<=2 ? 2 : 3;                    // griglia 2x2 -> 3x3
      const Hmax = L===1 ? 2 : L<=3 ? 3 : 4;       // altezza massima 2 -> 3 -> 4
      // Struttura "a scalinata": le altezze non crescono mai verso l'osservatore,
      // così ogni colonna è visibile e il totale è sempre deducibile.
      const h = [];
      let total = 0;
      for(let y=0;y<N;y++){
        h.push([]);
        for(let x=0;x<N;x++){
          let maxA = Hmax;
          if(y>0) maxA = Math.min(maxA, h[y-1][x]);
          if(x>0) maxA = Math.min(maxA, h[y][x-1]);
          if(x===0 && y===0) { h[y].push(Math.max(2, Hmax-rnd(2))); }
          else h[y].push(maxA<=1 ? maxA : 1+rnd(maxA));
          total += h[y][x];
        }
      }
      if(total < N*N || total > 30) return round();
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox","0 0 300 250");
      svg.setAttribute("width","280");
      const a=26, b=13, sH=26;      // mezza-larghezza, mezza-altezza diamante, altezza fianco
      const ox=150, oy=64;
      const TOP="#aab8ff", LEFT="#5c6fd6", RIGHT="#39479e", EDGE="#171338";
      // ordine del pittore: colonna per colonna, dal fondo al fronte, dal basso in alto
      // Ogni cubo "cade dal cielo" con un piccolo ritardo progressivo 🌧️🧊
      const cols=[];
      for(let y=0;y<N;y++)for(let x=0;x<N;x++)cols.push([x,y]);
      cols.sort((p,q)=>(p[0]+p[1])-(q[0]+q[1]) || p[0]-q[0]);
      let cubeIdx = 0;
      for(const [cx,cy] of cols){
        for(let z=0; z<h[cy][cx]; z++){
          const px = ox + (cx-cy)*a;
          const py = oy + (cx+cy)*b - z*sH + 78;
          const g = document.createElementNS("http://www.w3.org/2000/svg","g");
          g.setAttribute("class","cube-fall");
          g.style.animationDelay = (cubeIdx*55)+"ms";
          cubeIdx++;
          const face=(pts,fill)=>{
            const p = document.createElementNS("http://www.w3.org/2000/svg","polygon");
            p.setAttribute("points",pts.map(pt=>pt.join(",")).join(" "));
            p.setAttribute("fill",fill);
            p.setAttribute("stroke",EDGE); p.setAttribute("stroke-width","1.6");
            p.setAttribute("stroke-linejoin","round");
            g.append(p);
          };
          face([[px,py-b],[px+a,py],[px,py+b],[px-a,py]],TOP);
          face([[px-a,py],[px,py+b],[px,py+b+sH],[px-a,py+sH]],LEFT);
          face([[px+a,py],[px,py+b],[px,py+b+sH],[px+a,py+sH]],RIGHT);
          svg.append(g);
        }
      }
      const opts = uniqOptions(total, ()=> Math.max(2, total + pick([-3,-2,-1,1,2,3])) );
      askOptions(S,t("q_cube"),svg,opts,total,api,round,14+api.level*2);
    }
    round();
  }
};

/* ----- Jigsaw (WHTBB) ----- */
const jigsaw = {
  get name(){return t("g_jigsaw_n");}, get desc(){return t("g_jigsaw_d");},
  start(api){
    const S = api.stage;
    const COLORS = ["#ff6e87","#3ee8b5","#ffc94d","#5db8ff","#b78bff"];
    function pieceSVG(cells, size){
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox","0 0 2 2");
      svg.setAttribute("width",size); svg.setAttribute("height",size);
      cells.forEach((c,i)=>{
        const r = document.createElementNS("http://www.w3.org/2000/svg","rect");
        r.setAttribute("x", i%2); r.setAttribute("y", Math.floor(i/2));
        r.setAttribute("width",1); r.setAttribute("height",1);
        r.setAttribute("fill", c); r.setAttribute("stroke","#1b1745"); r.setAttribute("stroke-width","0.06");
        svg.append(r);
      });
      return svg;
    }
    function round(){
      const L = api.level;
      const N = L<=2 ? 4 : 5;                      // mosaico 4x4 -> 5x5
      // Il mosaico segue uno SCHEMA geometrico: così il pezzo mancante si può dedurre.
      const C = shuffle(COLORS).slice(0, L===1 ? 2 : 3);
      const k = C.length;
      const pat = pick([
        (x,y)=>C[(x+y)%k],            // strisce diagonali ↘
        (x,y)=>C[(x-y+10)%k],         // strisce diagonali ↗
        (x,y)=>C[x%k],                // strisce verticali
        (x,y)=>C[y%k],                // strisce orizzontali
        (x,y)=>C[((x%2)+(y%2))%k],    // scacchiera a blocchi
        (x,y)=>C[Math.min(x,N-1-x)%k] // strisce simmetriche
      ]);
      const grid = [];
      for(let i=0;i<N*N;i++) grid.push(pat(i%N, Math.floor(i/N)));
      const hx = rnd(N-1), hy = rnd(N-1);
      const holeIdx = [hy*N+hx, hy*N+hx+1, (hy+1)*N+hx, (hy+1)*N+hx+1];
      const correctPiece = holeIdx.map(i=>grid[i]);
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox",`0 0 ${N} ${N}`);
      svg.setAttribute("class","boardsvg");
      for(let i=0;i<N*N;i++){
        const r = document.createElementNS("http://www.w3.org/2000/svg","rect");
        r.setAttribute("x", i%N); r.setAttribute("y", Math.floor(i/N));
        r.setAttribute("width",1); r.setAttribute("height",1);
        r.setAttribute("fill", holeIdx.includes(i) ? "#141031" : grid[i]);
        r.setAttribute("stroke","#1b1745"); r.setAttribute("stroke-width","0.06");
        svg.append(r);
      }
      // opzioni: corretta + 3 varianti (con gli stessi colori dello schema)
      const variants = new Set([correctPiece.join(",")]);
      const opts = [{value:"OK", node:pieceSVG(correctPiece,86)}];
      let guard=0;
      while(opts.length<4 && guard++<100){
        const v = correctPiece.slice();
        const j = rnd(4);
        let c; do{ c = pick(C); }while(c===v[j]);
        v[j]=c;
        if(!variants.has(v.join(","))){ variants.add(v.join(",")); opts.push({value:"NO"+opts.length, node:pieceSVG(v,86)}); }
      }
      askOptions(S,t("q_jigsaw"),svg,shuffle(opts),"OK",api,round,14+api.level);
    }
    round();
  }
};

const asteroids = {

};

/* ----- Gli Ingranaggi (nuovo!) ----- */
const gears = {
  get name(){ return t("g_gears_n"); }, get desc(){ return t("g_gears_d"); },
  start(api){
    const S = api.stage;
    function round(){
      const L = api.level;
      // due lunghezze di catena per livello: 3-4, 4-5, 5-6, 6-7, 7-8
      const n = (2+L) + rnd(2);
      const small = n>=6;
      // raggi misti per un look organico
      const radii = Array.from({length:n},()=> (small?17:21) + rnd(small?7:9));
      // camminata casuale nel piano: ogni ingranaggio tocca SOLO il precedente
      let cx=[0], cy=[0];
      let guardAll = 0;
      outer: while(true){
        cx=[0]; cy=[0];
        let heading = 0; // direzione di marcia, deriva verso destra
        for(let i=1;i<n;i++){
          let placed = false;
          for(let tryi=0; tryi<40; tryi++){
            const ang = heading + (Math.random()*2.4-1.2);        // svolte fino a ~70 gradi
            const dist = radii[i-1]+radii[i]-2;
            const x = cx[i-1]+Math.cos(ang)*dist;
            const y = cy[i-1]+Math.sin(ang)*dist;
            // niente contatti con ingranaggi non adiacenti
            let ok = Math.abs(y) < 78;
            for(let k=0;k<i-1 && ok;k++){
              const dd = Math.hypot(x-cx[k], y-cy[k]);
              if(dd < radii[i]+radii[k]+7) ok = false;
            }
            if(ok){ cx.push(x); cy.push(y); heading = ang*0.55; placed = true; break; }
          }
          if(!placed){ if(guardAll++<12) continue outer; else { // fallback: in linea
              cx.push(cx[i-1]+radii[i-1]+radii[i]-2); cy.push(cy[i-1]); } }
        }
        break;
      }
      // viewBox adattato alla forma della catena
      let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
      for(let i=0;i<n;i++){
        minX=Math.min(minX,cx[i]-radii[i]); maxX=Math.max(maxX,cx[i]+radii[i]);
        minY=Math.min(minY,cy[i]-radii[i]); maxY=Math.max(maxY,cy[i]+radii[i]);
      }
      const pad = 26;
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox",(minX-pad)+" "+(minY-pad)+" "+(maxX-minX+pad*2)+" "+(maxY-minY+pad*2));
      svg.setAttribute("width","320");

      const startCW = rnd(2)===0;
      // bersaglio: Lv1-2 sempre l'ultimo; dal Lv3 un ingranaggio a caso (almeno il terzo)
      const target = L<=2 ? n-1 : 2+rnd(n-2);
      const targetCW = (target%2===0) ? startCW : !startCW;

      for(let i=0;i<n;i++){
        const g = document.createElementNS("http://www.w3.org/2000/svg","g");
        if(i===0) g.setAttribute("class", startCW ? "spin-cw" : "spin-ccw");
        const r = radii[i];
        const mk=(nm,attrs)=>{
          const e=document.createElementNS("http://www.w3.org/2000/svg",nm);
          for(const k in attrs)e.setAttribute(k,attrs[k]);
          g.append(e);return e;
        };
        const C = 2*Math.PI*(r-3);
        const teeth = Math.max(7, Math.round(r/3.2));
        const dash = (C/(teeth*2)).toFixed(2);
        const RED = "#e0455a";
        mk("circle",{cx:cx[i],cy:cy[i],r:r-3,fill:"none",stroke: i===target ? RED : "#5c6fd6","stroke-width":8,"stroke-dasharray":dash+" "+dash});
        mk("circle",{cx:cx[i],cy:cy[i],r:r-7,fill: i===target ? "#ffe6ea" : "#3d3580",stroke: i===target ? RED : "#8ea2ff","stroke-width": i===target ? 3 : 2});
        if(i===0){
          // freccia curva DENTRO l'ingranaggio, attorno al mozzo: gira insieme a lui
          const col = startCW ? "#17c795" : "#e8a51b";
          const a = Math.max(8, r*0.5);
          const P = th => [cx[i]+a*Math.cos(th), cy[i]+a*Math.sin(th)];
          const ths = -Math.PI/2;
          const the = startCW ? ths + Math.PI*1.45 : ths - Math.PI*1.45;
          const [sx,sy] = P(ths), [ex,ey] = P(the);
          mk("path",{d:"M "+sx.toFixed(1)+" "+sy.toFixed(1)+" A "+a+" "+a+" 0 1 "+(startCW?1:0)+" "+ex.toFixed(1)+" "+ey.toFixed(1),
                     fill:"none",stroke:col,"stroke-width":3.5,"stroke-linecap":"round"});
          const tang = the + (startCW ? Math.PI/2 : -Math.PI/2);
          const tipX = ex+7*Math.cos(tang), tipY = ey+7*Math.sin(tang);
          const b1 = the, b2 = the;
          mk("polygon",{points:
            tipX.toFixed(1)+","+tipY.toFixed(1)+" "+
            (ex+4.5*Math.cos(the)).toFixed(1)+","+(ey+4.5*Math.sin(the)).toFixed(1)+" "+
            (ex-4.5*Math.cos(the)).toFixed(1)+","+(ey-4.5*Math.sin(the)).toFixed(1),
            fill:col});
        }else if(i===target){
          // il "?" sta DENTRO l'ingranaggio incognita, rosso
          const qt = document.createElementNS("http://www.w3.org/2000/svg","text");
          qt.setAttribute("x",cx[i]); qt.setAttribute("y",cy[i]+r*0.32);
          qt.setAttribute("text-anchor","middle");
          qt.setAttribute("font-size",Math.round(r*0.95));
          qt.setAttribute("font-weight","900"); qt.setAttribute("fill",RED);
          qt.textContent = "?";
          g.append(qt);
        }else{
          for(let sp=0; sp<3; sp++){
            const a2 = Math.PI/3 + sp*(Math.PI*2/3);
            mk("line",{x1:cx[i],y1:cy[i],
                       x2:cx[i]+Math.cos(a2)*(r-10),y2:cy[i]+Math.sin(a2)*(r-10),
                       stroke:"#8ea2ff","stroke-width":3,"stroke-linecap":"round"});
          }
        }
        if(i!==target) mk("circle",{cx:cx[i],cy:cy[i],r:5,fill: i===0 ? (startCW ? "#17c795" : "#e8a51b") : "#8ea2ff"});
        const lbl = null;
        if(lbl){
          const tx=document.createElementNS("http://www.w3.org/2000/svg","text");
          tx.setAttribute("x",cx[i]); tx.setAttribute("y",cy[i]-r-8);
          tx.setAttribute("text-anchor","middle"); tx.setAttribute("font-size","24");
          tx.setAttribute("fill", i===0 ? (startCW ? "#17c795" : "#e8a51b") : "#c98a00");
          tx.setAttribute("font-weight","900");
          tx.textContent = lbl;
          svg.append(tx);
        }
        svg.append(g);
      }
      const GREEN = "<span style='color:#17c795;font-weight:900'>";
      const YELLOW = "<span style='color:#e8a51b;font-weight:900'>";
      askOptions(S,
        t("q_gears", (startCW?GREEN:YELLOW)+(startCW?t("cw"):t("ccw"))+"</span>"),
        svg,
        shuffle([
          {label:"<span style='color:#17c795;font-weight:900;font-size:clamp(30px,8vw,40px);line-height:1'>\u21bb</span>", value:"cw"},
          {label:"<span style='color:#e8a51b;font-weight:900;font-size:clamp(30px,8vw,40px);line-height:1'>\u21ba</span>", value:"ccw"}
        ]),
        targetCW ? "cw" : "ccw", api, round, 13+L);
    }
    round();
  }
};

const HEXDIRS = [["↗️",[1,-1]],["➡️",[1,0]],["↘️",[0,1]],["↙️",[-1,1]],["⬅️",[-1,0]],["↖️",[0,-1]]];
const hexPath = {
  get name(){return t("g_hex_n");}, get desc(){return t("g_hex_d");},
  start(api){
    const S = api.stage;
    const R = 2; // raggio griglia assiale
    const inGrid = (q,r)=> Math.abs(q)<=R && Math.abs(r)<=R && Math.abs(-q-r)<=R;
    function hexCenter(q,r,size,ox,oy){
      const x = ox + size*(Math.sqrt(3)*q + Math.sqrt(3)/2*r);
      const y = oy + size*(1.5*r);
      return [x,y];
    }
    function round(){
      let q=0,r=0;
      const steps=[];
      const nSteps = 2 + Math.min(api.level, 4);   // 3..6 mosse
      let guard=0;
      while(steps.length<nSteps && guard++<300){
        const [sym,[dq,dr]] = pick(HEXDIRS);
        if(!inGrid(q+dq,r+dr)) continue;
        q+=dq;r+=dr;steps.push(sym);
      }
      if(q===0&&r===0) return round();
      const destKey = q+","+r;
      const letters=["\ud83c\udf39","\ud83c\udf3b","\ud83c\udf38","\ud83c\udf37"];  // rosa, girasole, ciliegio, tulipano
      const all=[];
      for(let a=-R;a<=R;a++)for(let b=-R;b<=R;b++) if(inGrid(a,b)&&!(a===0&&b===0)) all.push(a+","+b);
      const cells = new Set([destKey]);
      while(cells.size<4) cells.add(pick(all));
      const houseOf={};
      shuffle([...cells]).forEach((k,i)=>houseOf[k]=letters[i]);
      const correctLetter = houseOf[destKey];

      const seq = el("div","arrowseq", steps.join(" "));
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox","0 0 300 270");

      const size=28, ox=150, oy=135;
      for(let a=-R;a<=R;a++)for(let b=-R;b<=R;b++){
        if(!inGrid(a,b)) continue;
        const [x,y]=hexCenter(a,b,size,ox,oy);
        const pts=[];
        for(let i=0;i<6;i++){
          const ang = Math.PI/180*(60*i-30);
          pts.push((x+size*0.92*Math.cos(ang))+","+(y+size*0.92*Math.sin(ang)));

        const p=document.createElementNS("http://www.w3.org/2000/svg","polygon");
        p.setAttribute("points",pts.join(" "));
        p.setAttribute("fill","#2f2868");p.setAttribute("stroke","#1b1745");p.setAttribute("stroke-width","2");
        svg.append(p);
        const k=a+","+b;
        let lbl = (a===0&&b===0)?"🐝":(houseOf[k]?houseOf[k]:null);
        if(lbl){
          const t=document.createElementNS("http://www.w3.org/2000/svg","text");
          t.setAttribute("x",x);t.setAttribute("y",y+8);

    }
    round();
  }
};

/* ----- Balance (WHTBB) ----- */
const balance = {
  get name(){return t("g_bal_n");}, get desc(){return t("g_bal_d");},

    const S = api.stage;
    const ITEMS = ["🍎","🍌","🍇","🍊","🍉","🥝","🥥","🍍"];
    let roundNum = 0;
    function scaleSVG(l, r, leftHeavy, width){
      // il piatto più PESANTE scende (dy positivo = sinistra giù)
      const dy = leftHeavy ? 17 : -17;
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");

      svg.setAttribute("width",width);
      const add = (n,attrs,txt)=>{
        const e=document.createElementNS("http://www.w3.org/2000/svg",n);
        for(const k in attrs)e.setAttribute(k,attrs[k]);
        if(txt!==undefined)e.textContent=txt;
        svg.append(e);return e;
      };
      add("polygon",{points:"104,95 116,95 112,58 108,58",fill:"#5c6fd6"});
      add("rect",{x:70,y:95,width:80,height:8,rx:4,fill:"#3c4aa8"});
      add("line",{x1:40,y1:55+dy,x2:180,y2:55-dy,stroke:"#8ea2ff","stroke-width":6,"stroke-linecap":"round"});
      add("circle",{cx:110,cy:55,r:5,fill:"#aab8ff"});
      add("line",{x1:40,y1:55+dy,x2:40,y2:68+dy,stroke:"#8ea2ff","stroke-width":4});
      add("line",{x1:180,y1:55-dy,x2:180,y2:68-dy,stroke:"#8ea2ff","stroke-width":4});
      add("path",{d:`M20 ${68+dy} h40 a20 12 0 0 1 -40 0 z`,fill:"#2f2868",stroke:"#8ea2ff"});
      add("path",{d:`M160 ${68-dy} h40 a20 12 0 0 1 -40 0 z`,fill:"#2f2868",stroke:"#8ea2ff"});
      add("text",{x:40,y:64+dy,"text-anchor":"middle","font-size":24},l);
      add("text",{x:180,y:64-dy,"text-anchor":"middle","font-size":24},r);
      return svg;
    }
    function round(){
      roundNum++;
      // difficoltà dal livello: 3 oggetti → 4 → 5 (con 2 → 3 → 4 bilance)
      const L = api.level;
      const n = L<=2 ? 3 : L<=4 ? 4 : 5;
      const items = shuffle(ITEMS).slice(0,n);
      const w = {};
      shuffle(Array.from({length:n},(_,i)=>i+1)).forEach((v,i)=>w[items[i]]=v);
      // confronti "a catena" sull'ordine dei pesi: la risposta è SEMPRE deducibile
      const sorted = items.slice().sort((a,b)=>w[a]-w[b]);
      const chain = [];
      for(let i=0;i<n-1;i++) chain.push([sorted[i], sorted[i+1]]);

      const scalesToShow = shuffle(chain).map(([a,b])=> rnd(2)===0 ? [a,b] : [b,a]);
      const board = el("div");
      board.style.display="flex";board.style.justifyContent="center";
      board.style.gap="2px";board.style.flexWrap="wrap";
      const wpx = n<=3 ? "225" : n===4 ? "185" : "165";
      scalesToShow.forEach(([a,b])=>{
        board.append(scaleSVG(a, b, w[a]>w[b], wpx));
      });
      const target = items.reduce((best,f)=> w[f]>w[best] ? f : best, items[0]);
      const opts = shuffle(items).map(f=>({label:f,value:f}));
      askOptions(S, t("q_bal")+"<br><span style='font-size:13px;font-weight:700;color:var(--dim)'>"+t("q_bal_hint")+"</span>",
        board, opts, target, api, round, 16+n*3);
    }
    round();
  }
};

/* ----- Missing Sign (WHTBB) ----- */
const missingSign = {
  get name(){return t("g_ops_n");}, get desc(){return t("g_ops_d");},
  start(api){
    const S = api.stage;
    const OPS = ["+","\u2212","\u00d7","\u00f7"];
    const apply = (a,op,b)=> op==="+" ? a+b : op==="\u2212" ? a-b : op==="\u00d7" ? a*b : a/b;
    // costruisce una catena valida (interi, positivi) passo per passo, usando tutti e 4 gli operatori
    function buildChain(len, maxN){
      let v = 2+rnd(maxN);
      const nums=[v], ops=[];
      for(let i=0;i<len;i++){
        let done=false;
        for(const op of shuffle(OPS.slice())){
          if(op==="\u00f7"){
            const divs=[]; for(let d=2; d<=Math.min(12,v); d++) if(v%d===0) divs.push(d);
            if(divs.length){ const b=pick(divs); nums.push(b); ops.push(op); v=v/b; done=true; break; }
          }else if(op==="\u2212"){
            if(v>3){ const b=2+rnd(Math.min(maxN,v-2)); nums.push(b); ops.push(op); v-=b; done=true; break; }
          }else if(op==="\u00d7"){
            if(v<=45){ const b=2+rnd(Math.min(9,maxN)); nums.push(b); ops.push(op); v*=b; done=true; break; }
          }else{
            const b=2+rnd(maxN); nums.push(b); ops.push(op); v+=b; done=true; break;
          }
        }
        if(!done){ const b=2+rnd(maxN); nums.push(b); ops.push("+"); v+=b; }
      }
      return {nums, result:v};
    }
    function round(){
      const L = api.level;
      const parenChance = L<=2 ? 0 : L<=4 ? 0.4 : 0.7;   // parentesi dal Lv3, spesso al Lv5
      const withParen = Math.random() < parenChance;
      const k = L<=2 ? 1 : 2;           // operatori da inserire
      const maxN = L<=1 ? 9 : L<=3 ? 12 : 15;
      let nums, result, paren=false;
      if(withParen){
        // a ?1 ( b ?2 c ): prima si risolve la parentesi
        let guard=0;
        while(guard++<300){
          const b=2+rnd(maxN), c=2+rnd(9);
          const op2=pick(OPS);
          if(op2==="\u00f7" && (c<2 || b%c!==0)) continue;
          if(op2==="\u2212" && b-c<=0) continue;
          const inner = apply(b,op2,c);
          if(!Number.isInteger(inner) || inner<=0) continue;
          const a=2+rnd(maxN);
          const op1=pick(OPS);
          if(op1==="\u00f7" && (inner<2 || a%inner!==0)) continue;
          const r = apply(a,op1,inner);
          if(!Number.isInteger(r) || r<=0 || r>500) continue;
          nums=[a,b,c]; result=r; paren=true; break;
        }
      }
      if(!paren){
        let guard=0, ch;
        do{ ch = buildChain(k, maxN); guard++; }while(guard<100 && (ch.result<=0 || ch.result>500));
        nums = ch.nums; result = ch.result;
      }
      const slots = paren ? 2 : k;

      S.innerHTML = "";
      S.append(el("p","question center",
        paren ? t("q_paren")
        : slots>1 ? t("q_ops2")
        : t("q_ops1")));
      const exprEl = el("div","bignum mathboard");
      exprEl.style.fontSize = slots>1 ? "min(clamp(24px,7vw,36px),5vh)" : "min(clamp(30px,9vw,44px),6vh)";
      const chosen = [];
      const slot = i => chosen[i]!==undefined
        ? "&nbsp;<span style='color:var(--gold)'>"+chosen[i]+"</span>&nbsp;"
        : "&nbsp;<span style='color:var(--mint)'>?</span>&nbsp;";
      const renderExpr = ()=>{
        let s;
        if(paren) s = nums[0]+" "+slot(0)+" ( "+nums[1]+" "+slot(1)+" "+nums[2]+" )";
        else{ s = String(nums[0]); for(let i=0;i<slots;i++) s += " "+slot(i)+" "+nums[i+1]; }
        exprEl.innerHTML = s+" = "+result;
      };
      renderExpr();
      S.append(exprEl);
      const grid = el("div","optgrid");   // SEMPRE tutti e 4 gli operatori
      let locked = false;
      OPS.forEach(o=>{
        const b = el("button","btn",o);
        b.onclick = ()=>{
          if(locked) return;
          chosen.push(o);
          renderExpr();
          if(chosen.length===slots){
            locked = true;
            let v;
            if(paren){
              const inner = apply(nums[1],chosen[1],nums[2]);
              v = apply(nums[0],chosen[0],inner);
            }else{
              v = nums[0];
              chosen.forEach((op,i)=>{ v = apply(v,op,nums[i+1]); });
            }
            const ok = v===result;   // accetta qualsiasi combinazione corretta
            exprEl.style.color = ok ? "var(--mint)" : "var(--coral)";
            if(!ok){
              let sol = null;
              const rec = (cur)=>{
                if(sol) return;
                if(cur.length===slots){
                  let vv;
                  if(paren){ vv = apply(nums[0],cur[0],apply(nums[1],cur[1],nums[2])); }
                  else{ vv = nums[0]; cur.forEach((op,i)=>{ vv = apply(vv,op,nums[i+1]); }); }
                  if(vv===result) sol = cur.slice();
                  return;
                }
                for(const o2 of OPS){ cur.push(o2); rec(cur); cur.pop(); }
              };
              rec([]);
              if(sol){
                chosen.length = 0; sol.forEach(o2=>chosen.push(o2));
                renderExpr();
                exprEl.style.color = "var(--mint)";
              }
            }
            ok ? api.correct(paren ? 36 : (slots===1 ? 17 : 31)) : api.wrong();
            setTimeout(round, ok ? 450 : 1300);
          }
        };
        grid.append(b);
      });
      S.append(grid);
    }
    round();
  }
};

const timeLapse = {
  get name(){return t("g_clock_n");}, get desc(){return t("g_clock_d");},
  start(api){
    const S = api.stage;
    function clockSVG(h,m){
      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox","0 0 120 120");
      svg.setAttribute("width","132");
      const add=(n,attrs)=>{const e=document.createElementNS("http://www.w3.org/2000/svg",n);
        for(const k in attrs)e.setAttribute(k,attrs[k]);svg.append(e);return e;};
      add("circle",{cx:60,cy:60,r:54,fill:"#efe9ff",stroke:"#8ea2ff","stroke-width":5});
      for(let i=0;i<12;i++){
        const a=Math.PI/6*i;
        add("line",{x1:60+46*Math.sin(a),y1:60-46*Math.cos(a),
                    x2:60+50*Math.sin(a),y2:60-50*Math.cos(a),
                    stroke:"#3c4aa8","stroke-width": i%3===0?4:2});
      }
      const ah = Math.PI/6*(h%12) + Math.PI/360*m;
      const am = Math.PI/30*m;
      add("line",{x1:60,y1:60,x2:60+26*Math.sin(ah),y2:60-26*Math.cos(ah),stroke:"#1b1745","stroke-width":6,"stroke-linecap":"round"});
      add("line",{x1:60,y1:60,x2:60+40*Math.sin(am),y2:60-40*Math.cos(am),stroke:"#ff6e87","stroke-width":4,"stroke-linecap":"round"});
      add("circle",{cx:60,cy:60,r:4,fill:"#1b1745"});
      return svg;
    }
    const fmt = mins => {
      const h=Math.floor(mins/60), m=mins%60;
      if(h===0) return m+" min";
      if(m===0) return h+" h";
      return h+" h "+m+" min";
    };
    function round(){
      const L = api.level;
      const step = L===1 ? 60 : L===2 ? 30 : 15;   // ore intere -> mezz'ore -> quarti d'ora
      const m1 = rnd(12)*60 + (L<=1 ? 0 : pick([0,step,step*2,step*3].filter(v=>v<60)));
      const maxSteps = L===1 ? 6 : L===2 ? 10 : 14;
      let diff = step * (1 + rnd(maxSteps));
      const m2 = (m1 + diff) % 720;
      const board = el("div");
      board.style.display="flex";board.style.justifyContent="center";
      board.style.gap="14px";board.style.alignItems="center";
      board.append(clockSVG(Math.floor(m1/60),m1%60));
      const arrow = el("div","", "→");
      arrow.style.fontSize="34px";arrow.style.fontWeight="900";arrow.style.color="var(--mint)";
      board.append(arrow, clockSVG(Math.floor(m2/60),m2%60));
      const opts = uniqOptions(diff, ()=>{
        const d = diff + step * pick([-2,-1,1,2]);
        return d>0 && d<720 ? d : diff+step;
      }).map(v=>({label:fmt(v),value:v}));
      askOptions(S,t("q_clock"),board,opts,diff,api,round,20+api.level*2);
    }
    round();
  }
};

        c.disabled = true;
        wrap.append(c);
        return {elm:c, emo:e};

/* ----- Action Sequence (WHTBB, stile Simon) ----- */
const actionSequence = {
  get name(){ return t("g_action_n"); }, get desc(){ return t("g_action_d"); },
  start(api){
    const S = api.stage;
    let timeouts = [];
    const later = (fn,ms)=>timeouts.push(setTimeout(fn,ms));
    function round(){
      timeouts.forEach(clearTimeout); timeouts = [];
      const L = api.level;
      const len = 2 + L;                             // sequenza: 3..7
      const N = 9;                                    // reticolo FISSO 3x3, sempre uguale

      S.innerHTML = "";
      const q = el("p","question center",t("q_watch",len));
      S.append(q);
      const grid = el("div","padgrid nine");
      const pads = [];
      for(let i=0;i<N;i++){
        const b = el("button","pad neutral c"+(i+1),"\u00a0");
        b.disabled = true;
        pads.push(b); grid.append(b);
      }
      S.append(grid);
      squareCells(grid);
      const t0 = Date.now();
      let phase = "play";
      const pbT = [];
      const pb = (fn,ms)=>{ const id = setTimeout(fn,ms); pbT.push(id); timeouts.push(id); };
      seq.forEach((p,i)=>{
        pb(()=>{
          pads[p].classList.add("lit");
          SFX.pad(p);
          pb(()=>pads[p].classList.remove("lit"),330);
        }, 500+i*540);
      });
      const enterInput = ()=>{
        if(phase!=="play") return;
        phase = "input";
        pbT.forEach(clearTimeout);
        pads.forEach(b=>b.classList.remove("lit"));
        q.textContent = t("q_repeat",len);
        pads.forEach(b=>b.disabled=false);
        let idx = 0, locked = false;
        pads.forEach((b,pi)=>{
          b.onclick = ()=>{
            if(locked) return;
            b.classList.add("lit");
            SFX.pad(pi);
            setTimeout(()=>b.classList.remove("lit"),200);
            if(pi===seq[idx]){
              idx++;
              if(idx===len){
                locked = true;
                api.correct(7*len-2);
                pads.forEach(x=>x.disabled=true);
                later(round,650);
              }
            }else{
              locked = true;
              pads[seq[idx]].classList.add("lit");
              api.wrong();
              pads.forEach(x=>x.disabled=true);
              later(round,1200);
            }
          };
        });
      };
      pb(enterInput, 500+len*540+320);
      // durante la riproduzione: il tocco la interrompe E conta gia' come primo input
      pads.forEach(b=>{
        b.disabled = false;
        b.onclick = ()=>{
          if(Date.now()-t0 < 100) return;
          enterInput();          // ora b.onclick e' il gestore di risposta...
          b.onclick();           // ...e questo stesso tocco risponde subito
        };
      });
    }
    round();
    return ()=>timeouts.forEach(clearTimeout);
  }
};


/* ----- Reticolo di Memoria (nuovo!) ----- */
const memoryGrid = {
  get name(){return t("g_grid_n");}, get desc(){return t("g_grid_d");},
  start(api){
    const S = api.stage;
    let timeouts = [];
    const later = (fn,ms)=>timeouts.push(setTimeout(fn,ms));
    function round(){
      timeouts.forEach(clearTimeout); timeouts = [];
      const L = api.level;
      const size = L<=2 ? 4 : 5;
      const nItems = Math.min(3+L, size*size-3);          // 4..8: si parte con una stella in pi\u00f9
      const showTime = Math.max(1200, 2500 - L*250);
      const cells = size*size;
      const spots = new Set(shuffle(Array.from({length:cells},(_,i)=>i)).slice(0,nItems));
      S.innerHTML = "";
      const q = el("p","question center",t("q_gridmem"));
      S.append(q);
      const grid = el("div","cellgrid");
      grid.style.gridTemplateColumns = "repeat("+size+",1fr)";
      const btns = [];
      for(let i=0;i<cells;i++){
        const b = el("button","cellbtn", spots.has(i) ? "⭐" : " ");
        b.disabled = true; btns.push(b); grid.append(b);
      }
      S.append(grid);
      squareCells(grid);
      const t0 = Date.now();
      let phase = "show", found = 0, locked = false;
      const startAnswer = ()=>{
        if(phase!=="show") return;
        phase = "answer";
        SFX.flip();
        btns.forEach(b=>{ b.textContent = "\u00a0"; });
        q.textContent = t("q_gridwhere", nItems);
      };
      later(startAnswer, showTime);
      btns.forEach((b,i)=>{
        b.disabled = false;
        b.onclick = ()=>{
          if(locked) return;
          if(phase==="show"){
            if(Date.now()-t0 < 100) return;   // filtra solo i tap-fantasma
            startAnswer();                     // copre tutto: questo tocco E' la prima risposta
          }
          if(b.classList.contains("good")) return;
          if(spots.has(i)){
            b.textContent = "\u2b50"; b.classList.add("good"); SFX.pop();
            found++;
            if(found===nItems){ locked = true; api.correct(17+L*2); later(round,650); }
          }else{
            locked = true;
            b.textContent = "\u2716"; b.classList.add("bad");
            btns.forEach((x,j)=>{ if(spots.has(j) && !x.classList.contains("good")){ x.textContent = "\u2b50"; x.style.opacity = .55; } });
            api.wrong(); later(round,1100);
          }
        };
      });
    }
    round();
    return ()=>timeouts.forEach(clearTimeout);
  }
};

/* ----- Trova l'Intruso (nuovo!) ----- */
const oddOneOut = {
  get name(){return t("g_odd_n");}, get desc(){return t("g_odd_d");},
  start(api){
    const S = api.stage;
    const EASY = [["\ud83c\udf4e","\ud83c\udf4f"],["\ud83c\udf15","\ud83c\udf17"],["\ud83d\ude00","\ud83d\ude0d"],["\ud83d\udc36","\ud83d\udc3a"],["\ud83d\udfe6","\ud83d\udfea"]];
    const MED  = [["\ud83d\ude42","\ud83d\ude43"],["\u25d0","\u25d1"],["b","d"],["6","9"],["\ud83d\ude3a","\ud83d\ude38"],["\ud83c\udf1d","\ud83c\udf1a"],["p","q"]];
    function round(){
      const L = api.level;
      const size = L<=1 ? 3 : L<=3 ? 4 : 5;
      const pool = L<=2 ? EASY : L<=3 ? EASY.concat(MED) : MED;
      const pair = pick(pool);
      const flip = rnd(2)===0;
      const base = flip ? pair[1] : pair[0];
      const odd  = flip ? pair[0] : pair[1];
      const cells = size*size;
      const oddIdx = rnd(cells);
      S.innerHTML = "";
      S.append(el("p","question center",t("q_odd")));
      const grid = el("div","cellgrid");
      grid.style.gridTemplateColumns = "repeat("+size+",1fr)";
      let locked = false;
      for(let i=0;i<cells;i++){
        const btn = el("button","cellbtn", i===oddIdx ? odd : base);
        btn.onclick = ()=>{
          if(locked) return; locked = true;
          const ok = i===oddIdx;
          btn.classList.add(ok ? "good" : "bad");
          if(!ok) grid.children[oddIdx].classList.add("good");
          ok ? api.correct(10+L) : api.wrong();
          setTimeout(round, ok ? 380 : 850);
        };
        grid.append(btn);
      }
      S.append(grid);
      squareCells(grid);
    }
    round();
  }
};

/* ----- Sudoku dei Simboli (nuovo!) ----- */
const symbolSudoku = {
  get name(){return t("g_sudoku_n");}, get desc(){return t("g_sudoku_d");},
  start(api){
    const S = api.stage;
    const SYMS = ["\ud83d\udd3a","\u2b50","\ud83d\udfe2","\ud83c\udf19"];
    function latin(n){
      const rows = shuffle(Array.from({length:n},(_,i)=>i));
      const cols = shuffle(Array.from({length:n},(_,i)=>i));
      const sidx = shuffle(Array.from({length:n},(_,i)=>i));
      const g = [];
      for(let r=0;r<n;r++){ g.push([]); for(let c=0;c<n;c++) g[r].push(sidx[(rows[r]+cols[c])%n]); }
      return g;
    }
    function round(){
      const L = api.level;
      const n = L<=2 ? 3 : 4;
      const holes = L<=1 ? 1 : L<=2 ? 2 : L<=3 ? 2 : L<=4 ? 3 : 4;
      const syms = SYMS.slice(0,n);
      const g = latin(n);
      const rIdx = shuffle(Array.from({length:n},(_,i)=>i)).slice(0,holes);
      const cIdx = shuffle(Array.from({length:n},(_,i)=>i)).slice(0,holes);
      const holeSet = new Set(rIdx.map((r,k)=>r*n+cIdx[k]));
      const order = [...holeSet];
      let cur = 0, locked = false;
      S.innerHTML = "";
      S.append(el("p","question center",t("q_sudoku")));
      const grid = el("div","cellgrid");
      grid.style.gridTemplateColumns = "repeat("+n+",1fr)";
      const btns = [];
      for(let i=0;i<n*n;i++){
        const r = Math.floor(i/n), c = i%n;
        const isHole = holeSet.has(i);
        const b = el("button","cellbtn"+(isHole?" holecell":""), isHole ? "?" : syms[g[r][c]]);
        b.disabled = true; btns.push(b); grid.append(b);
      }
      S.append(grid);
      squareCells(grid);
      const mark = ()=>{
        btns.forEach(b=>b.classList.remove("activecell"));
        if(cur<order.length) btns[order[cur]].classList.add("activecell");
      };
      mark();
      const opts = el("div","optgrid");
      opts.style.gridTemplateColumns = "repeat("+n+",1fr)";
      syms.forEach((s,si)=>{
        const b = el("button","btn",s);
        b.onclick = ()=>{
          if(locked || cur>=order.length) return;
          const i = order[cur], r = Math.floor(i/n), c = i%n;
          if(si===g[r][c]){
            btns[i].textContent = s;
            btns[i].classList.remove("holecell","activecell");
            btns[i].classList.add("good");
            SFX.pop();
            cur++;
            if(cur===order.length){ locked = true; api.correct(14+holes*6); setTimeout(round,600); }
            else mark();
          }else{
            locked = true;
            btns[i].classList.add("bad");
            btns[i].textContent = syms[g[r][c]];
            const okBtn = [...opts.children].find(x=>x.textContent===syms[g[r][c]]);
            if(okBtn) okBtn.classList.add("flash-ok");
            api.wrong(); setTimeout(round,1300);
          }
        };
        opts.append(b);
      });
      S.append(opts);
    }
    round();
  }
};

/* ----- Catena di Calcolo (nuovo!) ----- */
const equationBalance = {
  get name(){return t("g_eq_n");}, get desc(){return t("g_eq_d");},
  start(api){
    const S = api.stage;
    const M = "&nbsp;<span style='color:var(--mint);font-weight:900'>?</span>&nbsp;";
    function round(){
      const L = api.level;
      let html, ans, twoUnknowns = false;
      let guard = 0;
      while(guard++ < 200){
        if(L<=2){
          const m = L===1 ? 5 : 7;
          if(rnd(2)===0){
            const b=2+rnd(m-1), c=2+rnd(m-1), a=1+rnd(L===1?9:15);
            ans = b*c - a;
            if(ans<1 || ans>40) continue;
            html = a+" + "+M+" = "+b+" \u00d7 "+c;
          }else{
            const a=1+rnd(9), b=2+rnd(m-1), c=2+rnd(m-1);
            ans = a + b + c;
            html = M+" \u2212 "+a+" = "+b+" + "+c;
          }
        }else if(L===3){
          if(rnd(2)===0){
            const q=2+rnd(8), a=2+rnd(5);
            const prod = q*a;
            const divs=[]; for(let d=2; d<=prod/2; d++) if(prod%d===0 && prod/d>=2) divs.push(d);
            if(!divs.length) continue;
            const b=pick(divs), c=prod/b;
            if((b===a&&c===q)||(b===q&&c===a)) continue;
            ans=q; html = M+" \u00d7 "+a+" = "+b+" \u00d7 "+c;
          }else{
            const a=2+rnd(7), b=2+rnd(7), c=1+rnd(a*b-2);
            ans = a*b - c;
            if(ans<1) continue;
            html = a+" \u00d7 "+b+" = "+c+" + "+M;
          }
        }else if(L===4){
          twoUnknowns = true;
          if(rnd(2)===0){
            const q=2+rnd(8), b=2+rnd(3);
            ans=q; html = M+" + "+(q*(b-1))+" = "+M+" \u00d7 "+b;
          }else{
            const q=2+rnd(8), a=2+rnd(3);
            ans=q; html = M+" \u00d7 "+a+" = "+M+" + "+(q*(a-1));
          }
        }else{
          if(rnd(2)===0){
            const a=2+rnd(5), b=1+rnd(6), q=b+1+rnd(8);
            ans=q; html = a+" \u00d7 ( "+M+" \u2212 "+b+" ) = "+(a*(q-b));
          }else{
            const b=2+rnd(4), c=2+rnd(8), a=1+rnd(9);
            ans = b*c - a;
            if(ans<1) continue;
            html = "( "+M+" + "+a+" ) \u00f7 "+b+" = "+c;
          }
        }
        break;
      }
      const board = el("div","bignum mathboard",html);
      board.style.fontSize = "min(clamp(24px,7.5vw,40px),5.5vh)";
      const opts = uniqOptions(ans, ()=>{
        const d = pick([-3,-2,-1,1,2,3,-5,5]);
        const c2 = ans + d;
        return c2>=1 ? c2 : ans + Math.abs(d);
      });
      askOptions(S,
        twoUnknowns ? t("q_eq2") : t("q_eq"),
        board, opts, ans, api, round, 23+L*2);
    }
    round();
  }
};

});

}
